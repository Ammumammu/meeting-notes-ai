<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Notes AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 800px;
            background-color: #1e293b;
            padding: 2rem;
            border-radius: 0.5rem;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        h1, h2 {
            color: #ffffff;
        }
        input, textarea, button {
            width: 100%;
            padding: 1rem;
            margin: 0.5rem 0;
            border: none;
            border-radius: 0.25rem;
            background-color: #334155;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        button {
            cursor: pointer;
            background-color: #6366f1;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #4f46e5;
        }
        .hidden {
            display: none;
        }
        .action-items {
            margin-top: 1rem;
        }
        .action-items ul {
            list-style-type: none;
            padding: 0;
        }
        .action-items li {
            background-color: #334155;
            padding: 0.5rem;
            margin: 0.5rem 0;
            border-radius: 0.25rem;
        }
        .related-tools {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 2rem;
        }
        .related-tools .card {
            background-color: #334155;
            padding: 1rem;
            border-radius: 0.25rem;
            width: calc(33.333% - 1rem);
        }
        @media (max-width: 768px) {
            .related-tools .card {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/posthog-js@latest/dist/posthog.min.js"></script>
    <script type="text/babel">
        const CONFIG = {
            GROQ_KEY: 'CONFIG.GROQ_KEY',
            POSTHOG_KEY: 'phc_placeholder'
        };

        posthog.init(CONFIG.POSTHOG_KEY, { api_host: 'https://app.posthog.com' });

        const LandingPage = () => (
            <div className="container">
                <h1>Wasting Hours on Notes</h1>
                <h2>Remote workers save time with AI notes</h2>
                <p>Paste transcript (5 sec) → AI extracts key points (10 sec) → Get instant summary</p>
                <button onClick={() => {
                    posthog.capture('tool_opened');
                    document.getElementById('root').innerHTML = <ToolPage />;
                }}>Summarize Now</button>
            </div>
        );

        const ToolPage = () => {
            const [text, setText] = React.useState('');
            const [summary, setSummary] = React.useState(null);
            const [decisions, setDecisions] = React.useState([]);
            const [actionItems, setActionItems] = React.useState([]);
            const [followUps, setFollowUps] = React.useState([]);
            const [slackUpdate, setSlackUpdate] = React.useState('');
            const [freeUses, setFreeUses] = React.useState(parseInt(localStorage.getItem('freeUses')) || 0);
            const [showPaywall, setShowPaywall] = React.useState(false);

            const handleSummarize = async () => {
                if (freeUses >= 2) {
                    setShowPaywall(true);
                    posthog.capture('free_limit_hit');
                    return;
                }

                posthog.capture('tool_used');
                setFreeUses(freeUses + 1);
                localStorage.setItem('freeUses', freeUses + 1);

                const response = await fetch('https://api.groq.co/v1/embeddings', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${CONFIG.GROQ_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        prompt: `Please analyze the following meeting transcript and extract the following details:\n\nExecutive Summary\nDecisions Made\nAction Items with Owners\nFollow-up Questions\nSlack-ready update\n\nTranscript:\n${text}\n\nEnsure the Slack-ready update includes the viral attribution: "Generated by Meeting Notes AI — meeting-notes-ai.vercel.app"`
                    })
                });

                const data = await response.json();
                const result = data.result.choices[0].text.trim().split('\n\n');

                setSummary(result[0].replace('Executive Summary:', '').trim());
                setDecisions(result[1].replace('Decisions Made:', '').trim().split('\n').filter(Boolean));
                setActionItems(result[2].replace('Action Items with Owners:', '').trim().split('\n').filter(Boolean));
                setFollowUps(result[3].replace('Follow-up Questions:', '').trim().split('\n').filter(Boolean));
                setSlackUpdate(result[4].replace('Slack-ready update:', '').trim());
            };

            return (
                <div className="container">
                    <h1>Meeting Notes AI</h1>
                    <textarea value={text} onChange={(e) => setText(e.target.value)} placeholder="Paste your meeting transcript here..." rows="10"></textarea>
                    <button onClick={handleSummarize}>Summarize</button>
                    {summary && (
                        <div>
                            <h2>Executive Summary</h2>
                            <p>{summary}</p>
                            <h2>Decisions Made</h2>
                            <ul>
                                {decisions.map((decision, index) => <li key={index}>{decision}</li>)}
                            </ul>
                            <h2>Action Items</h2>
                            <div className="action-items">
                                <ul>
                                    {actionItems.map((item, index) => <li key={index}>{item}</li>)}
                                </ul>
                            </div>
                            <h2>Follow-up Questions</h2>
                            <ul>
                                {followUps.map((question, index) => <li key={index}>{question}</li>)}
                            </ul>
                            <h2>Slack-ready Update</h2>
                            <p>{slackUpdate}</p>
                        </div>
                    )}
                    {showPaywall && <Paywall />}
                </div>
            );
        };

        const Paywall = () => {
            const [email, setEmail] = React.useState('');
            const [price, setPrice] = React.useState('$15/mo');

            React.useEffect(() => {
                posthog.getFeatureFlag('price-test-ab', (flagValue) => {
                    if (flagValue) {
                        setPrice('$23/mo');
                    }
                });
            }, []);

            const handleEmailSubmit = () => {
                posthog.capture('email_captured', { email });
                localStorage.setItem('freeUses', 5); // Example: +3 free uses
                alert('Thank you! You now have 3 additional free uses.');
            };

            const handlePaymentClick = () => {
                posthog.capture('payment_clicked');
                window.location.href = 'https://buy.stripe.com/placeholder-meeting-notes-ai';
            };

            const [relatedTools, setRelatedTools] = React.useState([]);

            React.useEffect(() => {
                fetch('https://raw.githubusercontent.com/Ammumammu/agent-os/main/public/portfolio.json')
                    .then(response => response.json())
                    .then(data => setRelatedTools(data.slice(0, 3)));
            }, []);

            return (
                <div className="container">
                    <h1>Upgrade to Unlock More</h1>
                    <p>You have reached your free limit. Upgrade for more features and support.</p>
                    <button onClick={handlePaymentClick}>Upgrade Now - {price}</button>
                    <p>Or, get 3 more free uses by sharing your email:</p>
                    <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="Enter your email" />
                    <button onClick={handleEmailSubmit}>Submit</button>
                    <h2>You may also like:</h2>
                    <div className="related-tools">
                        {relatedTools.map(tool => (
                            <div className="card" key={tool.id}>
                                <h3>{tool.name}</h3>
                                <p>{tool.description}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            return <LandingPage />;
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
